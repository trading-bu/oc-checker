name: OC Checker

on:
  # Run every 3 hours during office hours Mon–Fri (8:30, 11:30, 14:30, 17:30 CEST / UTC+2)
  # In winter (CET / UTC+1) these fire 1 hour earlier local time — adjust if needed
  schedule:
    - cron: '30 6,9,12,15 * * 1-5'
  # Also keep manual trigger for ad-hoc runs
  workflow_dispatch:

jobs:
  check-ocs:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit processed_ocs.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest state before running
        run: git pull origin main

      - name: Run OC checker
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS:          ${{ secrets.GOOGLE_CREDENTIALS }}
          ODOO_URL:                    ${{ secrets.ODOO_URL }}
          ODOO_DB:                     ${{ secrets.ODOO_DB }}
          ODOO_USERNAME:               ${{ secrets.ODOO_USERNAME }}
          ODOO_API_KEY:                ${{ secrets.ODOO_API_KEY }}
          SLACK_WEBHOOK_URL:           ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:             ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:            ${{ secrets.SLACK_CHANNEL_ID }}
        run: python oc_checker/run_oc_check.py

      - name: Commit updated processed_ocs.json
        if: always()
        run: |
          git config user.name  "OC Checker Bot"
          git config user.email "oc-checker@vanillasteel.com"
          git add processed_ocs.json
          git diff --cached --quiet || git commit -m "chore: update processed OCs log [skip ci]"
          git pull --rebase origin main
          git push
